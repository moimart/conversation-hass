services:
  audio-streamer:
    build:
      context: ./rpi
      dockerfile: Dockerfile
    container_name: hal-audio-streamer
    restart: unless-stopped
    network_mode: host  # so the container can reach the kiosk Chromium's loopback-only debugger
    environment:
      - AI_SERVER_HOST=${AI_SERVER_HOST}
      - AUDIO_DEVICE=${AUDIO_DEVICE:-default}
      - SAMPLE_RATE=${SAMPLE_RATE:-16000}
      - CHANNELS=${CHANNELS:-1}
      - CHUNK_SIZE=${CHUNK_SIZE:-4096}
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - PULSE_PROP=media.role=phone
      - CHROMIUM_DEBUG_URL=${CHROMIUM_DEBUG_URL:-http://127.0.0.1:9222}
      - SNAPSHOT_INTERVAL_S=${SNAPSHOT_INTERVAL_S:-60}
      # Display-power backend (DPMS): wlr-randr / xset / vcgencmd. The
      # corresponding host sockets / devices are bind-mounted below.
      - XDG_RUNTIME_DIR=/run/user/1000
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-1}
      - DISPLAY=${DISPLAY:-:0}
      - PAL_DISPLAY_OUTPUT=${PAL_DISPLAY_OUTPUT:-}
    devices:
      - /dev/snd:/dev/snd
      - /dev/input:/dev/input
    group_add:
      - audio
      - video
    volumes:
      - /run/dbus:/run/dbus:ro
      # Single read-only mount of the user-runtime dir covers both
      # PulseAudio (under .../pulse) and the Wayland socket (wayland-1)
      # used by wlr-randr for DPMS control.
      - /run/user/1000:/run/user/1000:ro
      - ~/.config/pulse/cookie:/root/.config/pulse/cookie:ro
      - ./rpi/web:/app/web:ro
      # X11 socket for the xset DPMS backend (no-op on Wayland-only hosts).
      - /tmp/.X11-unix:/tmp/.X11-unix:ro

  sendspin:
    build:
      context: ./rpi/sendspin
      dockerfile: Dockerfile
    container_name: hal-sendspin
    restart: unless-stopped
    network_mode: host
    environment:
      - HAL_DEVICE_NAME=${HAL_DEVICE_NAME:-HAL}
      - AUDIO_STREAMER_URL=http://localhost:${WEB_PORT:-8080}
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - PULSE_PROP=media.role=music
      - SENDSPIN_LOG_LEVEL=${SENDSPIN_LOG_LEVEL:-INFO}
    group_add:
      - audio
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse:ro
      - ~/.config/pulse/cookie:/root/.config/pulse/cookie:ro
