services:
  ai-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hal-ai-server
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - MCP_SERVER_URL=${MCP_SERVER_URL}
      - WAKE_WORD=${WAKE_WORD-hey hal}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - WYOMING_TTS_HOST=${WYOMING_TTS_HOST}
      - WYOMING_TTS_PORT=${WYOMING_TTS_PORT:-10200}
      - WYOMING_TTS_VOICE=${WYOMING_TTS_VOICE:-}
      - SAMPLE_RATE=${SAMPLE_RATE:-16000}
      - STT_ENGINE=${STT_ENGINE:-whisper}
      - STT_MODEL=${STT_MODEL:-}
    volumes:
      - ./server/models:/app/models
      - ./server/system_prompt.txt:/app/system_prompt.txt:ro
      - huggingface-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  huggingface-cache:
