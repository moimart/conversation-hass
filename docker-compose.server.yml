services:
  ai-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hal-ai-server
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - MCP_SERVER_URL=${MCP_SERVER_URL}
      - WAKE_WORD=${WAKE_WORD-hey hal}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-32768}
      - OLLAMA_NUM_PREDICT=${OLLAMA_NUM_PREDICT:-512}
      - AUTO_THEME=${AUTO_THEME:-true}
      - THEME_DAY=${THEME_DAY:-birch}
      - THEME_NIGHT=${THEME_NIGHT:-dark}
      - WYOMING_TTS_HOST=${WYOMING_TTS_HOST}
      - WYOMING_TTS_PORT=${WYOMING_TTS_PORT:-10200}
      - WYOMING_TTS_VOICE=${WYOMING_TTS_VOICE:-}
      - SAMPLE_RATE=${SAMPLE_RATE:-48000}
      - STT_ENGINE=${STT_ENGINE:-whisper}
      - STT_MODEL=${STT_MODEL:-}
      - MEMORY_URL=${MEMORY_URL:-http://shodh-memory:3030}
      - MEMORY_USER_ID=${MEMORY_USER_ID:-hal-default}
      - MEMORY_API_KEY=${MEMORY_API_KEY:-sk-shodh-dev-default}
    volumes:
      - ./server/models:/app/models
      - ./server/system_prompt.txt:/app/system_prompt.txt:ro
      - ./server/mcp_servers.json:/app/mcp_servers.json:ro
      - huggingface-cache:/root/.cache/huggingface
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - shodh-memory

  shodh-memory:
    image: varunshodh/shodh-memory:latest
    container_name: hal-shodh-memory
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      - SHODH_API_KEYS=${MEMORY_API_KEY:-sk-shodh-dev-default}
    volumes:
      - shodh-data:/data

volumes:
  huggingface-cache:
  shodh-data:
