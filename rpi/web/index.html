<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Clock + date (outside #app so flex centering doesn't fight position:fixed) -->
    <div class="clock-display" id="clock">
        <div class="clock-time" id="clock-time">--:--</div>
        <div class="clock-date" id="clock-date">---</div>
    </div>

    <div id="app">
        <!-- Ambient background -->
        <div class="ambient-grid"></div>

        <!-- Main eye container -->
        <div class="eye-container">
            <div class="eye-bezel"></div>
            <div class="eye-bezel-inner"></div>
            <div class="eye-outer-ring"></div>
            <div class="eye-middle-ring"></div>
            <div class="eye-glow"></div>
            <div class="eye-core">
                <div class="eye-iris"></div>
                <div class="eye-pupil"></div>
                <div class="eye-pupil-light"></div>
                <div class="eye-reflection"></div>
            </div>
            <video class="eye-stream" id="eye-stream" autoplay muted playsinline></video>
            <div class="eye-scan-line"></div>
        </div>

        <!-- Status indicator -->
        <div class="status-bar">
            <div class="status-dot"></div>
            <span class="status-text">IDLE</span>
        </div>

        <!-- Transcription display -->
        <div class="transcript-container">
            <div class="transcript-label">TRANSCRIPT</div>
            <div class="transcript-scroll" id="transcript">
                <div class="transcript-placeholder">Listening...</div>
            </div>
        </div>

        <!-- Response display -->
        <div class="response-container" id="response-container">
            <div class="response-header">
                <div class="response-label">HAL</div>
                <div class="response-timestamp" id="response-timestamp"></div>
            </div>
            <div class="response-text" id="response-text"></div>
        </div>

        <!-- Volume control -->
        <div class="volume-control" id="volume-control">
            <button class="vol-btn" id="vol-down" aria-label="Volume down">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                </svg>
            </button>
            <div class="vol-bar-track" id="vol-track">
                <div class="vol-bar-fill" id="vol-fill"></div>
            </div>
            <button class="vol-btn" id="vol-up" aria-label="Volume up">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                    <path d="M15.54 8.46a5 5 0 010 7.07"/>
                    <path d="M19.07 4.93a10 10 0 010 14.14"/>
                </svg>
            </button>
            <button class="vol-btn mute-btn" id="mute-btn" aria-label="Mute microphone">
                <!-- Mic active (not muted) -->
                <svg id="mute-icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="11" rx="3"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                <!-- Mic muted -->
                <svg id="mute-icon-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <line x1="1" y1="1" x2="23" y2="23"/>
                    <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
                    <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
        </div>

        <!-- Theme picker -->
        <div class="theme-picker">
            <select id="theme-select" aria-label="Theme">
                <option value="dark">HAL — Dark</option>
                <option value="sal">SAL — Cyan</option>
                <option value="birch">Birch — Light</option>
                <option value="odyssey">Odyssey — White</option>
                <option value="japandi">Japandi</option>
            </select>
        </div>

        <!-- Connection indicator -->
        <div class="connection-indicator" id="connection">
            <div class="conn-dot"></div>
            <span>DISCONNECTED</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5/dist/hls.min.js" defer></script>
    <script src="app.js"></script>
</body>
</html>
