<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="calendar.css">
    <link rel="stylesheet" href="conversation_log.css">
    <link rel="stylesheet" href="timer_overlay.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="orientation-wrapper">
    <!-- Matrix digital-rain background canvas — visible only on theme-matrix -->
    <canvas id="matrix-rain"></canvas>

    <!-- Clock + date (outside #app so flex centering doesn't fight position:fixed) -->
    <div class="clock-display" id="clock">
        <div class="clock-time" id="clock-time">--:--</div>
        <div class="clock-date" id="clock-date">---</div>
        <!-- Weather under the clock. Hidden until the server pushes a
             weather_update (no weather entity configured → stays hidden). -->
        <div class="weather-display" id="weather" hidden>
            <span class="weather-temp" id="weather-temp"></span>
            <span class="weather-icon" id="weather-icon"></span>
            <span class="weather-cond" id="weather-cond"></span>
        </div>
    </div>

    <div id="app">
        <!-- Ambient background -->
        <div class="ambient-grid"></div>

        <!-- Main eye container -->
        <div class="eye-container">
            <div class="eye-bezel"></div>
            <div class="eye-bezel-inner"></div>
            <div class="eye-outer-ring"></div>
            <div class="eye-middle-ring"></div>
            <div class="eye-glow"></div>
            <div class="eye-core">
                <div class="eye-iris"></div>
                <div class="eye-pupil"></div>
                <div class="eye-pupil-light"></div>
                <div class="eye-reflection"></div>
                <!-- Hue-rotated overlay used during processing state.
                     Cross-fades via opacity (compositor-cheap) instead
                     of animating filter: hue-rotate on every frame. -->
                <div class="eye-core-hue"></div>
            </div>
            <!-- Per-theme state-video layer: when the active theme
                 declares state_videos in its manifest, state_videos.js
                 populates this with <video> elements (one per unique
                 source) that crossfade with HAL's state. Hidden via
                 CSS while camera/stream takeover is active. -->
            <div class="eye-state-video-layer" hidden></div>
            <video class="eye-stream" id="eye-stream" autoplay muted playsinline></video>
            <div class="eye-scan-line"></div>
            <!-- Voice-timer countdown: the last 10 seconds tick here, inside
                 the orb cavity. Populated by timer_overlay.js on first
                 timer_countdown (only the originating device receives it). -->
            <div class="timer-countdown-layer" id="timer-countdown-root" hidden></div>
        </div>

        <!-- Status indicator -->
        <div class="status-bar">
            <div class="status-dot"></div>
            <span class="status-text">IDLE</span>
        </div>

        <!-- PTT hint chip — hidden until body.ptt-active is set by the
             server's {"type":"ptt_active","active":true} message. -->
        <div class="ptt-chip" id="ptt-chip" aria-hidden="true">
            <span class="ptt-chip-dot"></span>
            <span class="ptt-chip-label">PTT</span>
        </div>

        <!-- Transcription display -->
        <div class="transcript-container">
            <div class="transcript-label">TRANSCRIPT</div>
            <div class="transcript-scroll" id="transcript">
                <div class="transcript-placeholder">Listening...</div>
            </div>
        </div>

        <!-- Response display -->
        <div class="response-container" id="response-container">
            <div class="response-header">
                <div class="response-label">PAL</div>
                <div class="response-timestamp" id="response-timestamp"></div>
            </div>
            <div class="response-text" id="response-text"></div>
        </div>

        <!-- Volume control -->
        <div class="volume-control" id="volume-control">
            <button class="vol-btn" id="vol-down" aria-label="Volume down">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                </svg>
            </button>
            <div class="vol-bar-track" id="vol-track">
                <div class="vol-bar-fill" id="vol-fill"></div>
            </div>
            <button class="vol-btn" id="vol-up" aria-label="Volume up">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                    <path d="M15.54 8.46a5 5 0 010 7.07"/>
                    <path d="M19.07 4.93a10 10 0 010 14.14"/>
                </svg>
            </button>
            <button class="vol-btn mute-btn" id="mute-btn" aria-label="Mute microphone">
                <!-- Mic active (not muted) -->
                <svg id="mute-icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="11" rx="3"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                <!-- Mic muted -->
                <svg id="mute-icon-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <line x1="1" y1="1" x2="23" y2="23"/>
                    <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
                    <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
        </div>

        <!-- Theme picker -->
        <div class="theme-picker">
            <!-- Options populated dynamically from /api/themes — see app.js loadThemes(). -->
            <select id="theme-select" aria-label="Theme"></select>
        </div>

        <!-- Connection indicator -->
        <div class="connection-indicator" id="connection">
            <div class="conn-dot"></div>
            <span>DISCONNECTED</span>
        </div>
    </div>

    <!-- Calendar overlay — a sibling of #app, not a wrapper around it.
         Both panels share body's perspective and rotate in opposite
         directions around their own edges to give the cube-rotate
         feel without changing the orb's containing block. -->
    <div class="calendar-stage" id="calendar-root" aria-hidden="true">
      <!-- Populated by calendar.js on first show_calendar -->
    </div>

    <!-- Conversation log — full-screen scrollable history. Rotates in from
         the left (mirror of the calendar stage). -->
    <div class="clog-stage" id="conversation-log-root" aria-hidden="true">
      <!-- Populated by conversation_log.js on first show_conversation_log -->
    </div>

    <!-- Photo frame — full-screen ambient image with white clock overlay.
         Empty at rest; photo_frame.js populates on first show_photo_frame. -->
    <div class="photo-frame-stage" id="photo-frame-root" aria-hidden="true"></div>

    </div><!-- /orientation-wrapper -->

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5/dist/hls.min.js" defer></script>
    <!-- Pairing-code overlay (sets window.HALPairingOverlay) — must load before app.js. -->
    <script src="pairing_overlay.js"></script>
    <script src="app.js"></script>
</body>
</html>
